<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background:url('URL_BACKGROUND') no-repeat center/cover;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* LOADING */
#loading{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:#00f7ff;
    z-index:999;
}

/* APP */
.app{
    width:95%;
    max-width:380px;
    height:90vh;
    background:rgba(0,0,0,0.9);
    border-radius:20px;
    display:none;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 0 25px #00f7ff;
}

/* GRID CONTENT */
.content{
    flex:1;
    padding:10px;
    overflow-y:auto;
    color:white;

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

/* PROFILE FULL */
.profile{
    grid-column:span 2;
    text-align:center;
}

.profile img{
    width:70px;
    height:70px;
    border-radius:50%;
    border:2px solid #00f7ff;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.08);
    border-radius:10px;
    padding:8px;
    font-size:12px;
    box-shadow:0 0 8px rgba(0,255,255,0.2);
}

/* FULL WIDTH */
.full{grid-column:span 2;}

/* BUTTON */
.btn{
    display:block;
    padding:8px;
    border-radius:8px;
    text-align:center;
    background:linear-gradient(45deg,#00f7ff,#006eff);
    color:white;
    text-decoration:none;
    margin-top:5px;
}

/* GALERI */
.gallery{
    grid-column:span 2;
}
.gallery img{
    width:100%;
    border-radius:10px;
    margin-bottom:5px;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-around;
    background:black;
    padding:8px;
}

.nav-item{
    font-size:11px;
    text-align:center;
    color:white;
    cursor:pointer;
}

.nav-item.active{
    color:#00f7ff;
    text-shadow:0 0 10px #00f7ff;
}

/* PAGE */
.page{display:none;}

/* POPUP */
.popup{
    position:fixed;
    width:100%;height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-content{
    background:#111;
    color:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px #00f7ff;
}

/* CONFETTI */
.confetti{
    position:fixed;
    width:8px;height:8px;
    animation:fall 2s linear infinite;
}
@keyframes fall{
    from{transform:translateY(-100px);}
    to{transform:translateY(100vh);}
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
    <h2>Loading Game...</h2>
</div>

<!-- APP -->
<div class="app" id="app">

<div class="content">

<!-- HOME -->
<div id="home" class="page" style="display:block;">

    <div class="profile">
        <img src="URL_PROFILE">
        <h3>K1NG OF FIGHTER</h3>
    </div>

    <div class="card full">
        <a class="btn" onclick="sound()" href="https://wa.me/628xxxxxxx">WhatsApp</a>
        <a class="btn" onclick="sound()" href="LINK_GRUP">Grup</a>
    </div>

    <div class="card">Power: 5M</div>
    <div class="card">HQ: 16</div>

</div>

<!-- INFO -->
<div id="info" class="page">
    <div class="card">Aliansi aktif</div>
    <div class="card">No toxic</div>
    <div class="card">Solid team</div>
    <div class="card">Tambah info bebas</div>
</div>

<!-- GALERI -->
<div id="galeri" class="page">
    <div class="gallery">
        <img src="URL_FOTO_1">
        <img src="URL_FOTO_2">
        <img src="URL_FOTO_3">
    </div>
</div>

<!-- PENGUMUMAN -->
<div id="pengumuman" class="page">
    <div class="card">Event aktif</div>
    <div class="card">Wajib kontribusi</div>
    <div class="card">Tambah pengumuman</div>
</div>

<!-- DONASI -->
<div id="donasi" class="page">
    <div class="card full">DANA: 628xxxxxxx</div>
    <button class="btn full" onclick="donasi()">Sudah Donasi</button>
</div>

</div>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-item active" onclick="nav('home',this)">Home</div>
    <div class="nav-item" onclick="nav('info',this)">Info</div>
    <div class="nav-item" onclick="nav('galeri',this)">Galeri</div>
    <div class="nav-item" onclick="nav('pengumuman',this)">News</div>
    <div class="nav-item" onclick="nav('donasi',this)">Donasi</div>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-content">
        🎉 Terima kasih sudah berdonasi! 🎉
    </div>
</div>

<audio id="klik" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>

/* LOADING */
setTimeout(()=>{
    document.getElementById("loading").style.display="none";
    document.getElementById("app").style.display="flex";
},1500);

/* SOUND */
function sound(){
    document.getElementById("klik").play();
}

/* NAV */
function nav(id,el){
    sound();
    document.querySelectorAll('.page').forEach(p=>p.style.display='none');
    document.getElementById(id).style.display='block';

    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    el.classList.add('active');
}

/* DONASI */
function donasi(){
    sound();
    document.getElementById("popup").style.display="flex";

    for(let i=0;i<20;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"%";
        c.style.background="hsl("+Math.random()*360+",100%,50%)";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),2000);
    }

    setTimeout(()=>{
        document.getElementById("popup").style.display="none";
        window.location.href="https://wa.me/628xxxxxxx?text=Saya%20baru%20saja%20berdonasi";
    },2000);
}
</script>

</body>
        </html>
