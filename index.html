<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POWER FIGHTER</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:url("bg.jpg");
background-size:cover;
background-attachment:fixed;
color:white;
}

.container{max-width:420px;margin:auto;padding:15px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav button{
background:none;border:none;color:white;font-weight:bold;
}

.page{display:none;}
.active{display:block;}

.card{
background:rgba(30,41,59,0.9);
padding:15px;
border-radius:12px;
margin-top:10px;
}

.chat-box{
height:260px;
overflow:auto;
background:#020617;
padding:10px;
border-radius:10px;
}

.msg{display:flex;margin:5px 0;gap:8px;}
.bubble{padding:8px;border-radius:12px;max-width:70%;}
.me .bubble{background:#22c55e;margin-left:auto;}
.other .bubble{background:#334155;}

.profile{
width:35px;height:35px;border-radius:50%;
object-fit:cover;
}

input,button{
padding:10px;margin:5px;border:none;border-radius:8px;
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('donasi')">Donasi</button>
</div>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h2 onclick="showPage('dashboard')" style="cursor:pointer;">POWER FIGHTER</h2>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">

<div class="card">
<h3>Chat</h3>

<div class="chat-box" id="chatBox"></div>

<!-- typing muncul disini -->
<div id="typingBox" style="font-size:12px;color:#22c55e;"></div>

<input id="chatNama" placeholder="Nama">
<input id="msg" placeholder="Pesan">
<button onclick="kirimChat()">Kirim</button>

</div>

</div>

<!-- DONASI -->
<div id="donasi" class="page">
<div class="card">
<h3>Donasi</h3>

<p>DANA:</p>
<img src="dana.jpg" width="100%">

<p>QRIS:</p>
<img src="qris.jpg" width="100%">
</div>
</div>

</div>

<script>
// NAV
function showPage(p){
document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
document.getElementById(p).classList.add('active');
}

// FIREBASE
const firebaseConfig={
apiKey:"AIzaSyBnvcyMdTflihDPg68zsLG-9QxiyV36hgg",
authDomain:"miawwquenn.firebaseapp.com",
databaseURL:"https://miawwquenn-default-rtdb.firebaseio.com",
projectId:"miawwquenn"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// CHAT
let userId = Date.now();

function kirimChat(){
let nama=document.getElementById("chatNama").value || "User";
let msg=document.getElementById("msg").value;

if(!msg) return;

db.ref("chat").push({nama,msg});
document.getElementById("msg").value="";
}

// tampil chat
db.ref("chat").limitToLast(50).on("child_added",snap=>{
let d=snap.val();

let div=document.createElement("div");
div.className="msg";

div.innerHTML=`
<div class="bubble">
<b>${d.nama}</b><br>${d.msg}
</div>
`;

chatBox.appendChild(div);
chatBox.scrollTop=chatBox.scrollHeight;
});

// TYPING
document.getElementById("msg").addEventListener("input", ()=>{
db.ref("typing/"+userId).set({
nama: document.getElementById("chatNama").value || "User"
});

clearTimeout(window.typingTimeout);
window.typingTimeout = setTimeout(()=>{
db.ref("typing/"+userId).remove();
},1500);
});

// tampil typing
db.ref("typing").on("value", snap=>{
let text="";
snap.forEach(d=>{
if(d.key != userId){
text += d.val().nama + " sedang mengetik... ";
}
});
document.getElementById("typingBox").innerHTML=text;
});

// hapus typing saat keluar
window.addEventListener("beforeunload", ()=>{
db.ref("typing/"+userId).remove();
});
</script>

</body>
</html>
