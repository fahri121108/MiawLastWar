<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POWER FIGHTER LINK BIO</title><style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#000428,#004e92);
    color:white;
    text-align:center;
}

.container{
    max-width:420px;
    margin:auto;
    padding:20px;
}

.profile img{
    width:110px;
    border-radius:50%;
    border:3px solid #00eaff;
}

.btn{
    display:block;
    background:#00eaff;
    color:black;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
}

.card{
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:15px;
    margin-top:15px;
}

input, button{
    padding:10px;
    border-radius:8px;
    border:none;
    margin:5px;
}

.chat-box{
    height:150px;
    overflow:auto;
    background:#111;
    padding:10px;
    border-radius:10px;
    text-align:left;
}

.leaderboard{
    text-align:left;
}

</style></head>
<body><div class="container"><div class="profile">
<img src="poto.jpg">
<h2>POWER FIGHTER</h2>
</div><a href="https://wa.me/628xxxx" class="btn">WhatsApp</a> <a href="https://discord.gg/xxxx" class="btn">Discord</a>

<div class="card">
<h3>Donasi</h3>
<img src="qris.jpg" width="100%">
<p>DANA: 08xxxxxxxxxx</p>
<input type="text" id="nama" placeholder="Nama">
<input type="number" id="jumlah" placeholder="Jumlah Donasi">
<button onclick="donasi()">Kirim</button>
</div><div class="card">
<h3>Leaderboard Donasi</h3>
<div class="leaderboard" id="leaderboard"></div>
</div><div class="card">
<h3>Chat Room</h3>
<div class="chat-box" id="chat"></div>
<input type="text" id="msg" placeholder="Tulis pesan">
<button onclick="kirimChat()">Kirim</button>
</div><div class="card">
<h3>Informasi</h3>
<p>Open recruitment aktif<br>Event terbaru tersedia</p>
</div></div><script>
let dataDonasi = JSON.parse(localStorage.getItem('donasi')) || [];
let chatData = JSON.parse(localStorage.getItem('chat')) || [];

function renderLeaderboard(){
    let el = document.getElementById('leaderboard');
    el.innerHTML = '';
    dataDonasi.sort((a,b)=>b.jumlah-a.jumlah);
    dataDonasi.forEach(d=>{
        el.innerHTML += `<p>${d.nama} - Rp${d.jumlah}</p>`;
    });
}

function donasi(){
    let nama = document.getElementById('nama').value;
    let jumlah = document.getElementById('jumlah').value;

    if(!nama || !jumlah) return alert('Isi dulu');

    dataDonasi.push({nama, jumlah});
    localStorage.setItem('donasi', JSON.stringify(dataDonasi));

    alert('Terima kasih donasinya! Kirim bukti ke WhatsApp');
    window.location.href = 'https://wa.me/628xxxx';

    renderLeaderboard();
}

function renderChat(){
    let el = document.getElementById('chat');
    el.innerHTML='';
    chatData.forEach(c=>{
        el.innerHTML += `<p><b>${c.nama}:</b> ${c.msg}</p>`;
    });
}

function kirimChat(){
    let msg = document.getElementById('msg').value;
    let nama = prompt('Masukkan nama');
    if(!msg || !nama) return;

    chatData.push({nama, msg});
    localStorage.setItem('chat', JSON.stringify(chatData));

    document.getElementById('msg').value='';
    renderChat();
}

renderLeaderboard();
renderChat();
</script></body>
                                       </html>
