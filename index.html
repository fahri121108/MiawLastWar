<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POWER FIGHTER</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

.container{max-width:420px;margin:auto;}

.topbar{
background:#020617;
padding:10px;
text-align:center;
}

.chat-bg{
background:url("bg.jpg");
background-size:cover;
height:65vh;
overflow:auto;
padding:10px;
}

.msg{display:flex;margin:5px 0;gap:8px;}
.me{justify-content:flex-end;}

.bubble{
padding:8px;
border-radius:12px;
max-width:70%;
}

.me .bubble{background:#22c55e;color:black;}
.other .bubble{background:#1e293b;}

.profile{
width:35px;height:35px;border-radius:50%;
object-fit:cover;
}

.thumb{
width:120px;border-radius:10px;cursor:pointer;
}

.replyBox{
background:#00000040;
padding:5px;
font-size:11px;
border-left:3px solid #22c55e;
margin-bottom:4px;
}

.viewer{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.viewer img{
max-width:100%;
max-height:100%;
}

input,button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
}

.online{
font-size:12px;
color:#22c55e;
}

.card{
background:#1e293b;
padding:10px;
margin:5px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="topbar">
<b>POWER FIGHTER</b>
<div id="onlineBox" class="online"></div>
<div id="typingBox"></div>
</div>

<div class="container">

<div id="chatBox" class="chat-bg"></div>

<div id="replyPreview"></div>

<input id="nama" placeholder="Nama">
<input type="file" id="foto">
<button onclick="simpanProfil()">Simpan Profil</button>

<input id="msg" placeholder="Ketik pesan">
<input type="file" id="img">
<button onclick="kirim()">Kirim</button>

<div class="card">
<h3>Donasi</h3>
<p>DANA:</p>
<img src="dana.jpg" width="100%">
<p>QRIS:</p>
<img src="qris.jpg" width="100%">
</div>

<div class="card">
<a href="https://wa.me/628XXXXXXXXXX">WhatsApp</a><br>
<a href="https://discord.gg/XXXXX">Discord</a>
</div>

</div>

<div class="viewer" id="viewer" onclick="this.style.display='none'">
<img id="viewImg">
</div>

<script>
// FIREBASE
const firebaseConfig={
apiKey:"AIzaSyBnvcyMdTflihDPg68zsLG-9QxiyV36hgg",
authDomain:"miawwquenn.firebaseapp.com",
databaseURL:"https://miawwquenn-default-rtdb.firebaseio.com",
projectId:"miawwquenn"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// PROFIL
let user={
nama:localStorage.getItem("nama")||"",
foto:localStorage.getItem("foto")||"https://i.imgur.com/4M34hi2.png"
};

nama.value=user.nama;

function simpanProfil(){
let name=nama.value;
let file=foto.files[0];

if(!name) return alert("Isi nama");

if(file){
let r=new FileReader();
r.onload=e=>{
user={nama:name,foto:e.target.result};
localStorage.setItem("nama",name);
localStorage.setItem("foto",e.target.result);
alert("Profil tersimpan");
};
r.readAsDataURL(file);
}else{
user.nama=name;
localStorage.setItem("nama",name);
}
}

// ONLINE
let userId=Date.now();

db.ref("online/"+userId).set({nama:user.nama});
window.addEventListener("beforeunload",()=>{
db.ref("online/"+userId).remove();
});

db.ref("online").on("value",snap=>{
let text="🟢 Online: ";
snap.forEach(d=>{
text+=d.val().nama+", ";
});
onlineBox.innerHTML=text;
});

// TYPING
msg.addEventListener("input",()=>{
db.ref("typing/"+userId).set({nama:user.nama});

clearTimeout(window.typingTimeout);
window.typingTimeout=setTimeout(()=>{
db.ref("typing/"+userId).remove();
},1500);
});

db.ref("typing").on("value",snap=>{
let text="";
snap.forEach(d=>{
if(d.key!=userId){
text+=d.val().nama+" mengetik... ";
}
});
typingBox.innerHTML=text;
});

// CHAT
let reply=null;

function kirim(){
let text=msg.value;
let file=img.files[0];

if(!user.nama) return alert("Isi profil");

let send=(imgData)=>{
db.ref("chat").push({
nama:user.nama,
foto:user.foto,
msg:text,
img:imgData||null,
reply:reply
});
msg.value="";
reply=null;
replyPreview.innerHTML="";
};

if(file){
let r=new FileReader();
r.onload=e=>send(e.target.result);
r.readAsDataURL(file);
}else send(null);
}

db.ref("chat").limitToLast(50).on("child_added",snap=>{
let d=snap.val(); let id=snap.key;

let div=document.createElement("div");
div.className="msg "+(d.nama===user.nama?"me":"other");

div.innerHTML=`
${d.nama!==user.nama?`<img src="${d.foto}" class="profile">`:''}
<div class="bubble">

${d.reply?`<div class="replyBox">${d.reply.msg||"Gambar"}</div>`:""}

<b>${d.nama}</b><br>
${d.msg||""}

${d.img?`
<br>📷 Gambar<br>
<img src="${d.img}" class="thumb" onclick="lihat('${d.img}')">
`:''}

<br>
<button onclick='setReply(${JSON.stringify(d)})'>Reply</button>
${d.nama===user.nama?`<button onclick="hapus('${id}')">Hapus</button>`:""}

</div>
`;

chatBox.appendChild(div);
chatBox.scrollTop=chatBox.scrollHeight;
});

// FITUR
function setReply(d){
reply=d;
replyPreview.innerHTML=`<div class="replyBox">Reply: ${d.msg||"Gambar"}</div>`;
}

function hapus(id){
db.ref("chat/"+id).remove();
}

function lihat(src){
viewer.style.display="flex";
viewImg.src=src;
}
</script>

</body>
</html>
