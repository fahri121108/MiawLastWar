<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POWER FIGHTER</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
color:white;
}

.container{max-width:420px;margin:auto;padding:15px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav button{
background:none;border:none;color:white;font-weight:bold;
}

.page{display:none;}
.active{display:block;}

.card{
background:rgba(30,41,59,0.9);
padding:15px;
border-radius:15px;
margin-top:10px;
backdrop-filter:blur(10px);
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.chat-box{
height:260px;
overflow:auto;
background:#020617;
padding:10px;
border-radius:10px;
}

.msg{display:flex;gap:8px;margin:5px 0;}

.bubble{
padding:8px;
border-radius:12px;
max-width:70%;
}

.profile{
width:35px;height:35px;border-radius:50%;
object-fit:cover;
}

.thumb{
width:60px;height:60px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

.rank{
padding:10px;
margin:5px;
border-radius:10px;
background:#020617;
}

.top1{box-shadow:0 0 12px gold;}
.top2{box-shadow:0 0 12px silver;}
.top3{box-shadow:0 0 12px orange;}

.online{font-size:12px;color:#22c55e;}

button,input{
padding:10px;margin:5px;border:none;border-radius:10px;
}

.admin{background:red;color:white;}

.link-btn{
display:block;
text-align:center;
background:#22c55e;
margin-top:5px;
padding:10px;
border-radius:10px;
color:black;
text-decoration:none;
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('donasi')">Donasi</button>
<button onclick="showPage('admin')">Admin</button>
</div>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h2 onclick="showPage('dashboard')" style="cursor:pointer;">POWER FIGHTER</h2>
<p class="online">🟢 Online</p>
</div>

<div class="card">
<h3>Leaderboard</h3>

<h4>Total Donasi: <span id="totalDonasi">Rp0</span></h4>

<div id="leaderboard"></div>

<div style="display:flex;justify-content:space-between;">
<button onclick="prevPage()">⬅ Prev</button>
<button onclick="nextPage()">Next ➡</button>
</div>

<h3>Semua Donatur</h3>
<div id="donaturList"></div>
</div>

<div class="card">
<a href="https://wa.me/628XXXXXXXXXX" class="link-btn">WhatsApp</a>
<a href="https://discord.gg/XXXXX" class="link-btn">Discord</a>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">

<div class="card">
<h3>Galeri</h3>
<div id="galeri"></div>
<input type="file" id="galeriUser">
<button onclick="uploadGaleriUser()">Upload</button>
<button class="admin" onclick="clearGaleri()">Hapus Galeri (Admin)</button>
</div>

<div class="card">
<h3>Chat Room</h3>
<div class="chat-box" id="chatBox"></div>

<input id="chatNama" placeholder="Nama">
<input type="file" id="chatFoto">
<input id="msg" placeholder="Pesan">
<input type="file" id="chatImg">

<button onclick="kirimChat()">Kirim</button>
<button class="admin" onclick="clearChat()">Hapus Room Chat</button>
</div>

</div>

<!-- DONASI -->
<div id="donasi" class="page">

<div class="card">
<h3>Donasi</h3>

<p>No DANA:</p>
<img src="dana.jpg">

<p>QRIS:</p>
<img src="qris.jpg">
</div>

<div class="card">
<input id="nama" placeholder="Nama">
<input id="jumlah" type="number" placeholder="Jumlah">
<input type="file" id="bukti">
<button onclick="kirimDonasi()">Kirim Bukti</button>
</div>

<div class="card">
<h3>Pending (Admin)</h3>
<div id="pending"></div>
</div>

</div>

<!-- ADMIN -->
<div id="admin" class="page">
<div class="card">
<input id="adminPass" placeholder="Password">
<button onclick="loginAdmin()">Login</button>
</div>

<div class="card">
<button class="admin" onclick="clearPending()">Hapus Pending</button>
<button class="admin" onclick="clearLeaderboard()">Hapus Leaderboard</button>
</div>
</div>

</div>

<script>

// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyBnvcyMdTflihDPg68zsLG-9QXiyV36hgg",
authDomain: "miawwquenn.firebaseapp.com",
databaseURL: "https://miawwquenn-default-rtdb.firebaseio.com",
projectId: "miawwquenn"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// NAV
function showPage(p){
document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
document.getElementById(p).classList.add('active');
}

// ADMIN
let isAdmin=false;
function loginAdmin(){
if(adminPass.value==="12345"){
isAdmin=true;
alert("Admin aktif");
}else alert("Salah");
}

// CHAT
function kirimChat(){
db.ref("chat").push({
nama:chatNama.value,
msg:msg.value
});
msg.value="";
}

db.ref("chat").limitToLast(50).on("value",snap=>{
chatBox.innerHTML="";
snap.forEach(item=>{
let d=item.val();
chatBox.innerHTML+=`
<div class="msg">
<div class="bubble"><b>${d.nama}</b><br>${d.msg}</div>
</div>`;
});
});

// GALERI
db.ref("galeri").on("value",snap=>{
galeri.innerHTML="";
snap.forEach(d=>{
galeri.innerHTML+=`
<img src="${d.val().img}" class="thumb" onclick="window.open('${d.val().img}')">
`;
});
});

function uploadGaleriUser(){
let file=galeriUser.files[0];
let r=new FileReader();
r.onload=e=>{
db.ref("galeri").push({img:e.target.result});
};
r.readAsDataURL(file);
}

function clearGaleri(){
if(isAdmin) db.ref("galeri").remove();
}

// DONASI
function kirimDonasi(){
db.ref("donasi").push({
nama:nama.value,
jumlah:Number(jumlah.value)
});
}

// ===== LEADERBOARD PAGINATION =====
let currentPage = 1;
const perPage = 5;
let lastData = [];

function rupiah(x){
return "Rp" + Number(x).toLocaleString("id-ID");
}

db.ref("donasi").on("value",snap=>{
let data=[];
let total=0;

snap.forEach(d=>{
let v=d.val();
v.jumlah=Number(v.jumlah)||0;
data.push(v);
total+=v.jumlah;
});

data.sort((a,b)=>b.jumlah-a.jumlah);

lastData = data;

document.getElementById("totalDonasi").innerText = rupiah(total);

render();
});

function render(){
leaderboard.innerHTML="";
donaturList.innerHTML="";

let start=(currentPage-1)*perPage;
let end=start+perPage;

let page=lastData.slice(start,end);

// leaderboard page
page.forEach((d,i)=>{
let real=start+i;

let cls=real==0?"top1":real==1?"top2":real==2?"top3":"";
let badge=real==0?"🥇":real==1?"🥈":real==2?"🥉":"";

leaderboard.innerHTML+=`
<div class="rank ${cls}">
${badge} #${real+1} ${d.nama} - ${rupiah(d.jumlah)}
</div>`;
});

// semua donatur
lastData.forEach(d=>{
donaturList.innerHTML+=`
<div class="rank">
${d.nama} - ${rupiah(d.jumlah)}
</div>`;
});
}

function nextPage(){
if(currentPage*perPage < lastData.length){
currentPage++;
render();
}
}

function prevPage(){
if(currentPage>1){
currentPage--;
render();
}
}

// CLEAR
function clearChat(){ if(isAdmin) db.ref("chat").remove(); }
function clearPending(){ if(isAdmin) db.ref("pending").remove(); }
function clearLeaderboard(){ if(isAdmin) db.ref("donasi").remove(); }

</script>

</body>
</html>
