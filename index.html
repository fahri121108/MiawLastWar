<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POWER FIGHTER</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
color:white;
}

.container{max-width:420px;margin:auto;padding:15px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav button{
background:none;border:none;color:white;font-weight:bold;
}

.page{display:none;}
.active{display:block;}

.card{
background:rgba(30,41,59,0.9);
padding:15px;
border-radius:15px;
margin-top:10px;
backdrop-filter:blur(10px);
}

.rank{
padding:10px;
margin:5px;
border-radius:10px;
background:#020617;
}

/* ===== SULTAN EFFECT ===== */
.top1{animation:gold 1.5s infinite;border:1px solid gold;}
.top2{animation:silver 1.5s infinite;border:1px solid silver;}
.top3{animation:orange 1.5s infinite;border:1px solid orange;}

@keyframes gold{
0%{box-shadow:0 0 5px gold;}
50%{box-shadow:0 0 25px gold;}
100%{box-shadow:0 0 5px gold;}
}

@keyframes silver{
0%{box-shadow:0 0 5px silver;}
50%{box-shadow:0 0 25px silver;}
100%{box-shadow:0 0 5px silver;}
}

@keyframes orange{
0%{box-shadow:0 0 5px orange;}
50%{box-shadow:0 0 25px orange;}
100%{box-shadow:0 0 5px orange;}
}

button,input{
padding:10px;margin:5px;border:none;border-radius:10px;
}

.admin{background:red;color:white;}

.thumb{
width:60px;height:60px;object-fit:cover;border-radius:8px;
}

.chat-box{
height:220px;
overflow:auto;
background:#020617;
padding:10px;
border-radius:10px;
}

.msg{margin:5px 0;}
.bubble{background:#1e293b;padding:8px;border-radius:10px;}

.link-btn{
display:block;
background:#22c55e;
padding:10px;
text-align:center;
margin-top:5px;
border-radius:10px;
color:black;
text-decoration:none;
}
</style>
</head>

<body>

<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('dash')">Dashboard</button>
<button onclick="show('donasi')">Donasi</button>
<button onclick="show('admin')">Admin</button>
</div>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">

<div class="card">
<h2>POWER FIGHTER</h2>
<p>🔥 Aliansi Rank System + Donasi + Chat</p>
</div>

<div class="card">
<h3>Leaderboard</h3>
<h4>Total Donasi: <span id="total">Rp0</span></h4>
<div id="board"></div>
</div>

<div class="card">
<a class="link-btn" href="https://wa.me/628XXXXXXXXXX">WhatsApp</a>
<a class="link-btn" href="https://discord.gg/XXXXX">Discord</a>
</div>

</div>

<!-- DASHBOARD -->
<div id="dash" class="page">

<div class="card">
<h3>Chat Room</h3>
<div class="chat-box" id="chat"></div>

<input id="namaChat" placeholder="Nama">
<input id="msg" placeholder="Pesan">
<button onclick="sendChat()">Kirim</button>
</div>

<div class="card">
<h3>Galeri</h3>
<div id="galeri"></div>
<input type="file" id="imgGal">
<button onclick="upload()">Upload</button>
</div>

</div>

<!-- DONASI -->
<div id="donasi" class="page">

<div class="card">
<h3>Donasi</h3>

<p><b>No DANA:</b></p>
<img src="dana.jpg" style="width:100%;border-radius:10px;">

<p><b>QRIS:</b></p>
<img src="qris.jpg" style="width:100%;border-radius:10px;">
</div>

<div class="card">
<h3>Kirim Donasi (Pending ACC)</h3>

<input id="nama" placeholder="Nama">
<input id="jumlah" type="number" placeholder="Jumlah">
<button onclick="donasi()">Kirim Donasi</button>
</div>

<div class="card">
<h3>Status Pending</h3>
<div id="pendingUser"></div>
</div>

</div>

<!-- ADMIN -->
<div id="admin" class="page">

<div class="card">
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="card">
<h3>Pending Donasi</h3>
<div id="pendingAdmin"></div>
</div>

</div>

</div>

<script>
const fb={
apiKey:"AIzaSyBnvcyMdTflihDPg68zsLG-9QXiyV36hgg",
databaseURL:"https://miawwquenn-default-rtdb.firebaseio.com"
};

firebase.initializeApp(fb);
const db=firebase.database();

function show(x){
document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
document.getElementById(x).classList.add('active');
}

/* ===== ADMIN ===== */
let admin=false;
function login(){
if(pass.value=="12345"){
admin=true;
alert("Admin aktif");
loadPending();
}
}

/* ===== DONASI (PENDING SYSTEM) ===== */
function donasi(){
db.ref("pending").push({
nama:nama.value,
jumlah:Number(jumlah.value)
});
nama.value="";
jumlah.value="";
}

/* ===== ACC ===== */
function acc(k,v){
db.ref("donasi").push(v);
db.ref("pending/"+k).remove();
}

function reject(k){
db.ref("pending/"+k).remove();
}

/* ===== PENDING ADMIN ===== */
function loadPending(){
db.ref("pending").on("value",s=>{
pendingAdmin.innerHTML="";
s.forEach(d=>{
let k=d.key;
let v=d.val();

pendingAdmin.innerHTML+=`
<div class="rank">
${v.nama} - Rp${v.jumlah}
<button onclick='acc("${k}",${JSON.stringify(v)})'>ACC</button>
<button onclick='reject("${k}")'>X</button>
</div>`;
});
});
}

/* ===== USER PENDING ===== */
db.ref("pending").on("value",s=>{
pendingUser.innerHTML="";
s.forEach(d=>{
let v=d.val();
pendingUser.innerHTML+=`<div class="rank">${v.nama} - Rp${v.jumlah} (pending)</div>`;
});
});

/* ===== LEADERBOARD ===== */
let data=[];
db.ref("donasi").on("value",s=>{
data=[];let total=0;

s.forEach(d=>{
let v=d.val();
data.push(v);
total+=v.jumlah;
});

data.sort((a,b)=>b.jumlah-a.jumlah);

total.innerText="Rp"+total.toLocaleString("id-ID");

board.innerHTML="";
data.forEach((d,i)=>{
let c=i==0?"top1":i==1?"top2":i==2?"top3":"";
board.innerHTML+=`
<div class="rank ${c}">
${i+1}. ${d.nama} - Rp${d.jumlah}
</div>`;
});
});

/* ===== CHAT ===== */
function sendChat(){
db.ref("chat").push({
nama:namaChat.value,
msg:msg.value
});
}

db.ref("chat").on("value",s=>{
chat.innerHTML="";
s.forEach(d=>{
let v=d.val();
chat.innerHTML+=`
<div class="msg">
<div class="bubble"><b>${v.nama}</b><br>${v.msg}</div>
</div>`;
});
});

/* ===== GALERI ===== */
function upload(){
let f=imgGal.files[0];
let r=new FileReader();
r.onload=e=>{
db.ref("galeri").push({img:e.target.result});
};
r.readAsDataURL(f);
}

db.ref("galeri").on("value",s=>{
galeri.innerHTML="";
s.forEach(d=>{
galeri.innerHTML+=`<img src="${d.val().img}" class="thumb">`;
});
});
</script>

</body>
</html>
