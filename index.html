<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POWER FIGHTER</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
color:white;
}

.container{max-width:420px;margin:auto;padding:15px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav button{
background:none;border:none;color:white;font-weight:bold;
}

.page{display:none;}
.active{display:block;}

.card{
background:rgba(30,41,59,0.9);
padding:15px;
border-radius:15px;
margin-top:10px;
backdrop-filter:blur(10px);
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.chat-box{
height:260px;
overflow:auto;
background:#020617;
padding:10px;
border-radius:10px;
}

.msg{display:flex;gap:8px;margin:5px 0;}

.bubble{
padding:8px;
border-radius:12px;
max-width:70%;
}

.me .bubble{background:#22c55e;margin-left:auto;}
.other .bubble{background:#334155;}

.profile{
width:35px;height:35px;border-radius:50%;
object-fit:cover;
}

.thumb{
width:60px;height:60px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

.rank{
padding:10px;margin:5px;border-radius:10px;background:#020617;
}

.top1{box-shadow:0 0 12px gold;}
.top2{box-shadow:0 0 12px silver;}
.top3{box-shadow:0 0 12px orange;}

.online{
font-size:12px;
color:#22c55e;
}

button,input{
padding:10px;margin:5px;border:none;border-radius:10px;
}

.admin{background:red;color:white;}

.link-btn{
display:block;
text-align:center;
background:#22c55e;
margin-top:5px;
padding:10px;
border-radius:10px;
color:black;
text-decoration:none;
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('donasi')">Donasi</button>
<button onclick="showPage('admin')">Admin</button>
</div>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h2 onclick="showPage('dashboard')" style="cursor:pointer;">POWER FIGHTER</h2>
<p class="online">🟢 Online</p>
</div>

<div class="card">
<h3>Leaderboard</h3>
<div id="leaderboard"></div>
</div>

<div class="card">
<a href="https://wa.me/628XXXXXXXXXX" class="link-btn">WhatsApp</a>
<a href="https://discord.gg/XXXXX" class="link-btn">Discord</a>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">

<div class="card">
<h3>Galeri</h3>
<div id="galeri"></div>

<input type="file" id="galeriUser">
<button onclick="uploadGaleriUser()">Upload</button>

<button class="admin" onclick="clearGaleri()">Hapus Galeri (Admin)</button>
</div>

<div class="card">
<h3>Chat Room</h3>
<div class="chat-box" id="chatBox"></div>

<input id="chatNama" placeholder="Nama">
<input type="file" id="chatFoto">
<input id="msg" placeholder="Pesan">
<input type="file" id="chatImg">

<button onclick="kirimChat()">Kirim</button>

<button class="admin" onclick="clearChat()">Hapus Room Chat</button>
</div>

</div>

<!-- DONASI -->
<div id="donasi" class="page">

<div class="card">
<h3>Donasi</h3>

<p>No DANA:</p>
<img src="dana.jpg">

<p>QRIS:</p>
<img src="qris.jpg">
</div>

<div class="card">
<input id="nama" placeholder="Nama">
<input id="jumlah" type="number" placeholder="Jumlah">
<input type="file" id="bukti">
<button onclick="kirimDonasi()">Kirim Bukti</button>
</div>

<div class="card">
<h3>Pending (Admin)</h3>
<div id="pending"></div>
</div>

</div>

<!-- ADMIN -->
<div id="admin" class="page">
<div class="card">
<input id="adminPass" placeholder="Password">
<button onclick="loginAdmin()">Login</button>
</div>

<div class="card">
<button class="admin" onclick="clearPending()">Hapus Pending</button>
<button class="admin" onclick="clearLeaderboard()">Hapus Leaderboard</button>
</div>
</div>

</div>

<script>
// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyBnvcyMdTflihDPg68zsLG-9QxiyV36hgg",
authDomain: "miawwquenn.firebaseapp.com",
databaseURL: "https://miawwquenn-default-rtdb.firebaseio.com",
projectId: "miawwquenn"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// NAV
function showPage(p){
document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
document.getElementById(p).classList.add('active');
}

// ADMIN
let isAdmin=false;
function loginAdmin(){
if(adminPass.value==="12345"){
isAdmin=true;
alert("Admin aktif");
}else alert("Salah");
}

// CHAT
function kirimChat(){
let nama=chatNama.value;
let msgText=msg.value;
let fotoFile=chatFoto.files[0];
let imgFile=chatImg.files[0];

let r1=new FileReader();

r1.onload=e1=>{
let foto=e1.target.result;

let send=(img)=>{
db.ref("chat").push({
nama,foto,msg:msgText,img:img||null
});
msg.value="";
};

if(imgFile){
let r2=new FileReader();
r2.onload=e2=>send(e2.target.result);
r2.readAsDataURL(imgFile);
}else send(null);
};

if(fotoFile){
r1.readAsDataURL(fotoFile);
}else{
r1.onload({target:{result:"https://i.imgur.com/4M34hi2.png"}});
}
}

db.ref("chat").limitToLast(50).on("value",snap=>{
chatBox.innerHTML="";
snap.forEach(item=>{
let d=item.val(); let id=item.key;

chatBox.innerHTML+=`
<div class="msg">
<img src="${d.foto}" class="profile">
<div class="bubble">
<b>${d.nama}</b><br>${d.msg||""}
${d.img?`<img src="${d.img}" class="thumb" onclick="window.open('${d.img}')">`:""}
${d.nama===chatNama.value?`<br><button onclick="hapusChat('${id}')">Hapus</button>`:""}
</div>
</div>
`;
});
});

function hapusChat(id){
db.ref("chat/"+id).remove();
}

// GALERI
function uploadGaleriUser(){
let file=galeriUser.files[0];
let r=new FileReader();
r.onload=e=>{
db.ref("galeri").push({img:e.target.result});
};
r.readAsDataURL(file);
}

db.ref("galeri").on("value",snap=>{
galeri.innerHTML="";
snap.forEach(d=>{
galeri.innerHTML+=`
<img src="${d.val().img}" class="thumb" onclick="window.open('${d.val().img}')">
`;
});
});

function clearGaleri(){
if(isAdmin) db.ref("galeri").remove();
}

// DONASI
function kirimDonasi(){
let nama=document.getElementById("nama").value;
let jumlah=document.getElementById("jumlah").value;
let file=document.getElementById("bukti").files[0];

let reader=new FileReader();
reader.onload=e=>{
db.ref("pending").push({nama,jumlah,bukti:e.target.result});
alert("Terkirim");
};
reader.readAsDataURL(file);
}

// PENDING ADMIN ONLY
db.ref("pending").on("value",snap=>{
let el=document.getElementById("pending");
el.innerHTML="";

if(!isAdmin){
el.innerHTML="Admin Only";
return;
}

snap.forEach(item=>{
let id=item.key;
let d=item.val();

el.innerHTML+=`
<div class="card">
<p>${d.nama} - Rp${d.jumlah}</p>
<img src="${d.bukti}" class="thumb" onclick="window.open('${d.bukti}')">
<button onclick="acc('${id}','${d.nama}',${d.jumlah})">ACC</button>
<button onclick="hapusPending('${id}')">Hapus</button>
</div>`;
});
});

function acc(id,nama,jumlah){
db.ref("donasi").push({nama,jumlah});
db.ref("pending/"+id).remove();
}

function hapusPending(id){
db.ref("pending/"+id).remove();
}

// LEADERBOARD
db.ref("donasi").on("value",snap=>{
leaderboard.innerHTML="";
let data=[];
snap.forEach(d=>data.push(d.val()));
data.sort((a,b)=>b.jumlah-a.jumlah);

data.forEach((d,i)=>{
let cls=i==0?"top1":i==1?"top2":i==2?"top3":"";
let badge=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";
leaderboard.innerHTML+=`<div class="rank ${cls}">${badge} ${d.nama} - Rp${d.jumlah}</div>`;
});
});

// CLEAR
function clearChat(){ if(isAdmin) db.ref("chat").remove(); }
function clearPending(){ if(isAdmin) db.ref("pending").remove(); }
function clearLeaderboard(){ if(isAdmin) db.ref("donasi").remove(); }
</script>

</body>
</html>
