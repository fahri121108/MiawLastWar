<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POWER FIGHTER TOP X</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
color:white;
}

.container{max-width:420px;margin:auto;padding:15px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav button{
background:none;border:none;color:white;font-weight:bold;
}

.page{display:none;}
.active{display:block;}

.card{
background:rgba(30,41,59,0.9);
padding:15px;
border-radius:15px;
margin-top:10px;
backdrop-filter:blur(10px);
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.chat-box{
height:260px;
overflow:auto;
background:#020617;
padding:10px;
border-radius:10px;
}

.msg{display:flex;gap:8px;margin:5px 0;}

.bubble{
padding:8px;
border-radius:12px;
max-width:70%;
}

.me .bubble{background:#22c55e;margin-left:auto;}
.other .bubble{background:#334155;}

.profile{
width:35px;height:35px;border-radius:50%;
object-fit:cover;
}

.thumb{
width:60px;height:60px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

/* ===== LEADERBOARD SULTAN ===== */
.rank{
padding:10px;
margin:5px;
border-radius:12px;
background:#020617;
transition:all 0.4s ease;
animation:fadeInUp 0.4s ease;
}

@keyframes fadeInUp{
from{opacity:0; transform:translateY(15px);}
to{opacity:1; transform:translateY(0);}
}

.top1{
background:linear-gradient(45deg,gold,orange);
color:black;
font-weight:bold;
box-shadow:0 0 15px gold,0 0 40px orange;
animation:glowGold 1.5s infinite alternate;
}

.top2{
background:linear-gradient(45deg,silver,#e5e7eb);
color:black;
box-shadow:0 0 15px silver;
}

.top3{
background:linear-gradient(45deg,#cd7f32,#ffb347);
color:black;
box-shadow:0 0 15px #cd7f32;
}

@keyframes glowGold{
from{box-shadow:0 0 10px gold;}
to{box-shadow:0 0 30px gold,0 0 60px orange;}
}

.move{
transform:scale(1.07);
}

.online{
font-size:12px;
color:#22c55e;
}

button,input{
padding:10px;margin:5px;border:none;border-radius:10px;
}

.admin{background:red;color:white;}

.link-btn{
display:block;
text-align:center;
background:#22c55e;
margin-top:5px;
padding:10px;
border-radius:10px;
color:black;
text-decoration:none;
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('donasi')">Donasi</button>
<button onclick="showPage('admin')">Admin</button>
</div>

<div class="container">

<div id="home" class="page active">
<div class="card">
<h2 onclick="showPage('dashboard')" style="cursor:pointer;">ROOM NGOBROL</h2>
<p class="online">🟢 Online</p>
</div>

<div class="card">
<h3>Peringkat Donasi Mingguan</h3>
<div id="leaderboard"></div>
</div>

<div class="card">
<a href="#" class="https://wa.me/6289531746761">WhatsApp</a>
<a href="#" class="https://discord.gg/YEtrZH25y">Discord</a>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<div class="card">
<h3>Chat Room</h3>
<div class="chat-box" id="chatBox"></div>

<input id="chatNama" placeholder="Nama">
<input id="msg" placeholder="Pesan">
<button onclick="kirimChat()">Kirim</button>
</div>
</div>

<!-- DONASI -->
<div id="donasi" class="page">
<div class="card">
<input id="nama" placeholder="Nama">
<input id="jumlah" type="number" placeholder="Jumlah">
<button onclick="kirimDonasi()">Donasi</button>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<div class="card">
<input id="adminPass" placeholder="Password">
<button onclick="loginAdmin()">Login</button>
</div>
</div>

</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyBnvcyMdTflihDPg68zsLG-9QxiyV36hgg",
authDomain: "miawwquenn.firebaseapp.com",
databaseURL: "https://miawwquenn-default-rtdb.firebaseio.com",
projectId: "miawwquenn"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// NAV
function showPage(p){
document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
document.getElementById(p).classList.add('active');
}

// ADMIN
let isAdmin=false;
function loginAdmin(){
if(adminPass.value==="12345"){
isAdmin=true;
alert("Admin aktif");
}else alert("Salah");
}

// CHAT
function kirimChat(){
db.ref("chat").push({
nama:chatNama.value,
msg:msg.value
});
msg.value="";
}

db.ref("chat").limitToLast(50).on("value",snap=>{
chatBox.innerHTML="";
snap.forEach(item=>{
let d=item.val();
chatBox.innerHTML+=`
<div class="msg">
<div class="bubble"><b>${d.nama}</b><br>${d.msg}</div>
</div>`;
});
});

// DONASI
function kirimDonasi(){
db.ref("donasi").push({
nama:nama.value,
jumlah:Number(jumlah.value)
});
alert("Berhasil");
}

// ===== LEADERBOARD SULTAN =====
let lastRank = [];

function rupiah(angka){
return "Rp" + Number(angka).toLocaleString("id-ID");
}

db.ref("donasi").on("value",snap=>{
leaderboard.innerHTML="";

let data=[];

if(!snap.exists()){
leaderboard.innerHTML="<p>Belum ada donasi</p>";
return;
}

snap.forEach(d=>{
let val=d.val();
val.jumlah = Number(val.jumlah) || 0;
data.push(val);
});

data.sort((a,b)=>b.jumlah-a.jumlah);

data.forEach((d,i)=>{
let cls=i==0?"top1":i==1?"top2":i==2?"top3":"";
let badge=i==0?"👑🥇":i==1?"🥈":i==2?"🥉":"";

let prevIndex = lastRank.findIndex(x=>x.nama===d.nama);
let naik = prevIndex > i;

leaderboard.innerHTML+=`
<div class="rank ${cls} ${naik?'move':''}">
${badge} #${i+1} ${d.nama} - ${rupiah(d.jumlah)}
</div>`;
});

lastRank = data;
});

</script>

</body>
               </html>
