<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POWER FIGHTER</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
.container{max-width:420px;margin:auto;padding:15px;}
.nav{display:flex;justify-content:space-around;background:#020617;padding:10px;}
.nav button{background:none;border:none;color:white;font-weight:bold;}

.page{display:none;}
.active{display:block;}

.card{background:#1e293b;padding:15px;border-radius:12px;margin-top:10px;}

.chat-box{height:250px;overflow:auto;background:#020617;padding:10px;border-radius:10px;}

.msg{margin:5px 0;padding:8px;border-radius:10px;max-width:70%;}
.me{background:#22c55e;margin-left:auto;text-align:right;}
.other{background:#334155;}

input,button{padding:10px;margin:5px;border:none;border-radius:8px;}
.admin{background:red;color:white;}
img{width:100%;border-radius:10px;}
.rank{background:#020617;margin:5px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="nav">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('donasi')">Donasi</button>
<button onclick="showPage('chat')">Chat</button>
<button onclick="showPage('admin')">Admin</button>
</div>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">
<div class="card"><h2>POWER FIGHTER</h2></div>

<div class="card">
<h3>Leaderboard</h3>
<div id="leaderboard"></div>
</div>
</div>

<!-- DONASI -->
<div id="donasi" class="page">
<div class="card">
<input id="nama" placeholder="Nama">
<input id="jumlah" type="number" placeholder="Jumlah">
<input type="file" id="bukti">
<button onclick="kirimDonasi()">Kirim</button>
</div>

<div class="card">
<h3>Pending</h3>
<div id="pending"></div>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="page">
<div class="card">
<div class="chat-box" id="chatBox"></div>
<input id="chatNama" placeholder="Nama">
<input id="msg" placeholder="Pesan">
<button onclick="kirimChat()">Kirim</button>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<div class="card">
<h3>Login Admin</h3>
<input id="adminPass" type="password" placeholder="Password">
<button onclick="loginAdmin()">Login</button>
<p id="statusAdmin"></p>
</div>

<div class="card">
<h3>Kontrol</h3>
<button class="admin" onclick="clearChat()">Hapus Semua Chat</button>
<button class="admin" onclick="clearPending()">Hapus Semua Pending</button>
</div>
</div>

</div>

<script>
// NAV
function showPage(p){
document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
document.getElementById(p).classList.add('active');
}

// FIREBASE
const firebaseConfig = {
apiKey:"AIzaSyBnvcyMdTflihDPg68zsLG-9QxiyV36hgg",
authDomain:"miawwquenn.firebaseapp.com",
databaseURL:"https://miawwquenn-default-rtdb.firebaseio.com",
projectId:"miawwquenn"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ADMIN
let isAdmin=false;
const ADMIN_PASSWORD="12345";

function loginAdmin(){
let pass=document.getElementById("adminPass").value;
if(pass===ADMIN_PASSWORD){
isAdmin=true;
document.getElementById("statusAdmin").innerText="Login berhasil";
}else alert("Salah");
}

// CHAT
let userNama=localStorage.getItem("namaUser")||"";
if(userNama) document.getElementById("chatNama").value=userNama;

function kirimChat(){
let nama=document.getElementById("chatNama").value.trim();
let msg=document.getElementById("msg").value.trim();
if(!nama||!msg) return alert("Isi dulu");

localStorage.setItem("namaUser",nama);

db.ref("chat").push({nama,msg,time:Date.now()});
document.getElementById("msg").value="";
}

document.getElementById("msg").addEventListener("keydown",e=>{
if(e.key==="Enter") kirimChat();
});

db.ref("chat").limitToLast(50).on("child_added",snap=>{
let d=snap.val();
let box=document.getElementById("chatBox");

let div=document.createElement("div");
div.className="msg "+(d.nama===userNama?"me":"other");
div.innerHTML=`<b>${d.nama}</b><br>${d.msg}`;

box.appendChild(div);
box.scrollTop=box.scrollHeight;
});

// DONASI
function kirimDonasi(){
let nama=document.getElementById("nama").value;
let jumlah=document.getElementById("jumlah").value;
let file=document.getElementById("bukti").files[0];

if(!nama||!jumlah||!file) return alert("Lengkapi");

let reader=new FileReader();
reader.onload=e=>{
db.ref("pending").push({nama,jumlah,bukti:e.target.result});
alert("Terkirim");
};
reader.readAsDataURL(file);
}

// PENDING
db.ref("pending").on("value",snap=>{
let el=document.getElementById("pending");
el.innerHTML="";

snap.forEach(item=>{
let id=item.key;
let d=item.val();

el.innerHTML+=`
<div class="card">
<p><b>${d.nama}</b> - Rp${d.jumlah}</p>
<img src="${d.bukti}">
${isAdmin?`
<button class="admin" onclick="acc('${id}','${d.nama}',${d.jumlah})">ACC</button>
<button class="admin" onclick="hapus('${id}')">Hapus</button>
`:''}
</div>`;
});
});

// ACC
function acc(id,nama,jumlah){
if(!isAdmin) return alert("Bukan admin");
db.ref("donasi").push({nama,jumlah});
db.ref("pending/"+id).remove();
}

// HAPUS
function hapus(id){
if(!isAdmin) return alert("Bukan admin");
db.ref("pending/"+id).remove();
}

// CLEAR
function clearChat(){
if(!isAdmin) return alert("Bukan admin");
if(confirm("Hapus semua chat?")){
db.ref("chat").remove();
document.getElementById("chatBox").innerHTML="";
}
}

function clearPending(){
if(!isAdmin) return alert("Bukan admin");
if(confirm("Hapus semua pending?")){
db.ref("pending").remove();
document.getElementById("pending").innerHTML="";
}
}

// LEADERBOARD
db.ref("donasi").on("value",snap=>{
let el=document.getElementById("leaderboard");
el.innerHTML="";

let data=[];
snap.forEach(d=>data.push(d.val()));
data.sort((a,b)=>b.jumlah-a.jumlah);

data.forEach((d,i)=>{
let rank=i+1;
let badge="";
if(rank===1) badge="🥇 TOP 1";
else if(rank===2) badge="🥈 TOP 2";
else if(rank===3) badge="🥉 TOP 3";

el.innerHTML+=`
<div class="rank">
<b>${badge}</b><br>
${d.nama} - Rp${d.jumlah}
</div>`;
});
});
</script>

</body>
</html>
