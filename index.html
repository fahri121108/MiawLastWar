<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POWER FIGHTER</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#000428,#004e92);
    color:white;
    text-align:center;
}
.container {max-width:420px;margin:auto;padding:20px;}
.profile img {width:100px;border-radius:50%;}
.btn {
    display:block;
    background:#00eaff;
    color:black;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}
.card {
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}
input,button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
}
.chat-box {
    height:200px;
    overflow:auto;
    background:#111;
    padding:10px;
    border-radius:10px;
    text-align:left;
}
img.bukti {
    width:100%;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="profile">
    <img src="poto.jpg">
    <h2>POWER FIGHTER</h2>
</div>

<a href="#" class="btn">WhatsApp</a>
<a href="#" class="btn">Discord</a>

<div class="card">
    <h3>Donasi</h3>
    <img src="qris.jpg" width="100%">
    <input type="text" id="nama" placeholder="Nama">
    <input type="number" id="jumlah" placeholder="Jumlah">
    <input type="file" id="bukti">
    <button onclick="kirimDonasi()">Kirim Donasi</button>
</div>

<div class="card">
    <h3>Pending Donasi</h3>
    <div id="pending"></div>
</div>

<div class="card">
    <h3>Leaderboard</h3>
    <div id="leaderboard"></div>
</div>

<div class="card">
    <h3>Chat Room</h3>
    <div class="chat-box" id="chat"></div>
    <input type="text" id="chatNama" placeholder="Nama">
    <input type="text" id="msg" placeholder="Pesan">
    <button onclick="kirimChat()">Kirim</button>
</div>

</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBnvcyMdTflihDPg68zsLG-9QxiyV36hgg",
  authDomain: "miawwquenn.firebaseapp.com",
  databaseURL: "https://miawwquenn-default-rtdb.firebaseio.com",
  projectId: "miawwquenn"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= CHAT REALTIME FIX =================

// simpan nama
let userNama = localStorage.getItem("namaUser") || "";
if(userNama){
    document.getElementById("chatNama").value = userNama;
}

// kirim chat
function kirimChat(){
    let nama = document.getElementById('chatNama').value.trim();
    let msg = document.getElementById('msg').value.trim();

    if(!nama || !msg){
        alert("Isi nama & pesan!");
        return;
    }

    localStorage.setItem("namaUser", nama);

    db.ref("chat").push({
        nama,
        msg,
        time: Date.now()
    });

    document.getElementById("msg").value = "";
    document.getElementById("msg").focus();
}

// enter kirim
document.getElementById("msg").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        kirimChat();
    }
});

// 🔥 LISTENER BARU (INI KUNCI FIX)
const chatRef = db.ref("chat").limitToLast(50);

chatRef.on("child_added", snap => {
    let d = snap.val();
    let el = document.getElementById("chat");

    let div = document.createElement("div");
    div.innerHTML = `<p><b>${d.nama}</b>: ${d.msg}</p>`;

    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
});

// ================= DONASI =================
function kirimDonasi(){
    let nama = document.getElementById('nama').value;
    let jumlah = document.getElementById('jumlah').value;
    let file = document.getElementById('bukti').files[0];

    if(!nama || !jumlah || !file){
        alert("Isi semua + upload bukti!");
        return;
    }

    let reader = new FileReader();
    reader.onload = function(e){
        db.ref("pendingDonasi").push({
            nama,
            jumlah,
            bukti: e.target.result,
            time: Date.now()
        });

        alert("Donasi berhasil dikirim!");
    };
    reader.readAsDataURL(file);
}

// tampil pending
db.ref("pendingDonasi").on("value", snap=>{
    let el = document.getElementById("pending");
    el.innerHTML="";

    snap.forEach(d=>{
        let data = d.val();
        el.innerHTML += `
            <div>
                <p><b>${data.nama}</b> - Rp${data.jumlah}</p>
                <img src="${data.bukti}" class="bukti">
            </div>
        `;
    });
});

// leaderboard
db.ref("donasi").on("value", snap=>{
    let el = document.getElementById("leaderboard");
    el.innerHTML="";

    let data=[];
    snap.forEach(d=> data.push(d.val()));

    data.sort((a,b)=>b.jumlah-a.jumlah);

    data.forEach(d=>{
        el.innerHTML += `<p>${d.nama} - Rp${d.jumlah}</p>`;
    });
});

// ADMIN (console)
// approveDonasi("Nama",50000)
function approveDonasi(nama,jumlah){
    db.ref("donasi").push({nama,jumlah});
}
</script>

</body>
</html>
